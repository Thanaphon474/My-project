<!DOCTYPE html>
<html lang="lo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ຕິດຕໍ່ພວກເຮົາ - ທ່ຽວຈຳປາສັກ</title>
    <link rel="stylesheet" href="travel.css">
</head>
<body>

    <div class="contact-container">
        <div class="contact-info">
            <h2>ຕິດຕໍ່ສອບຖາມຂໍ້ມູນ</h2>
            <p>ຫາກທ່ານມີຂໍ້ສົງໄສ ຫຼື ຕ້ອງການຂໍ້ມູນເພີ່ມເຕີມກ່ຽວກັບສະຖານທີ່ທ່ອງທ່ຽວໃນແຂວງຈຳປາສັກ ພວກເຮົາພ້ອມໃຫ້ຄຳແນະນຳ.</p>
            
            <div class="details">
                <div class="item">
                    <strong>📍 ທີ່ຕັ້ງ:</strong> ບ້ານປາກເຊ, ເມືອງປາກເຊ, ແຂວງຈຳປາສັກ
                </div>
                <div class="item">
                    <strong>📞 ເບີໂທ:</strong> +856 20 XXXX XXXX
                </div>
                <div class="item">
                    <strong>✉️ ອີເມວ:</strong> info@visit-champasak.com
                </div>
            </div>
        </div>

        <form class="contact-form">
            <div class="input-group">
                <label>ຊື່ ແລະ ນາມສະກຸນ</label>
                <input type="text" placeholder="ໃສ່ຊື່ຂອງທ່ານ..." required>
            </div>
            <div class="input-group">
                <label>ອີເມວ</label>
                <input type="email" placeholder="example@mail.com" required>
            </div>
            <div class="input-group">
                <label>ຂໍ້ຄວາມທີ່ຕ້ອງການສອບຖາມ</label>
                <textarea rows="5" placeholder="ຂຽນຂໍ້ຄວາມຂອງທ່ານທີ່ນີ້..."></textarea>
            </div>
            <button type="submit">ສົ່ງຂໍ້ຄວາມ</button>
        </form>
    </div>

</body>
</html>
