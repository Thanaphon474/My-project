<!DOCTYPE html>
<html lang="lo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ຕິດຕໍ່ພວກເຮົາ - ທ່ຽວຈຳປາສັກ</title>
    <link rel="stylesheet" href="contact.css">
</head>
<body>
        <div class="contact-container">
            <div class="contact-info">
                <h2>Contact us for information</h2>
                <p>If you have any questions or need more information about tourist attractions in Champasak Province, we are here to advise.</p>
                
                <div class="details">
                    <div class="item">
                        <strong>📍 Location:</strong> Pakse, Pakse, Champasak Province
                    </div>
                    <div class="item">
                        <strong>📞 Tell:</strong> +856 20 XXXX XXXX
                    </div>
                    <div class="item">
                        <strong>✉️ Email:</strong> info@visit-champasak.com
                    </div>
                </div>
            </div>

            <form class="contact-form">
                <div class="input-group">
                    <label>NAME</label>
                    <input type="text" placeholder="Enter your name..." >
                </div>
                <div class="input-group">
                    <label>EMAIL</label>
                    <input type="email" placeholder="champasak.pakse@mail.com" >
                </div>
                <div class="input-group">
                    <label>INQUIRY STATEMENT</label>
                    <input type="text" placeholder="Write your message here...">
                </div>
                <button type="submit">Send a Massage</button>
            </form>
        </div>
</body>
</html>
